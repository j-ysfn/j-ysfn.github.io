<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Javad's Solar System - Assignment 7</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-sky color="#050505"></a-sky>

      <a-sphere id="sun" position="0 0 -15" radius="3" color="yellow" material="shader: flat;"
                  animation="property: material.color; from: #FFFF00; to: #FF4500; dur: 4000; dir: alternate; loop: true">
        <a-light type="point" intensity="2" distance="50"></a-light>
      </a-sphere>

      <a-entity position="0 0 -15" animation="property: rotation; to: 0 360 0; loop: true; dur: 5000; easing: linear">
        <a-sphere position="5 0 0" radius="0.3" color="#A5A5A5"
                  animation="property: rotation; to: 0 360 0; loop: true; dur: 2000; easing: linear"></a-sphere>
      </a-entity>

      <a-entity position="0 0 -15" animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear">
        <a-sphere position="7 0 0" radius="0.6" color="#E3BB76"
                  animation="property: rotation; to: 0 360 0; loop: true; dur: 3000; easing: linear"></a-sphere>
      </a-entity>

      <a-entity position="0 0 -15" animation="property: rotation; to: 0 360 0; loop: true; dur: 12000; easing: linear">
        <a-sphere position="10 0 0" radius="0.8" color="#2233FF"
                  animation="property: rotation; to: 0 360 0; loop: true; dur: 4000; easing: linear"></a-sphere>
      </a-entity>

      <a-entity position="0 0 -15" animation="property: rotation; to: 0 360 0; loop: true; dur: 16000; easing: linear">
        <a-sphere position="13 0 0" radius="0.7" color="#FF4500"
                  animation="property: rotation; to: 0 360 0; loop: true; dur: 5000; easing: linear"></a-sphere>
      </a-entity>

      <a-entity camera look-controls wasd-controls position="0 5 10"></a-entity>
    </a-scene>
  </body>
</html>
